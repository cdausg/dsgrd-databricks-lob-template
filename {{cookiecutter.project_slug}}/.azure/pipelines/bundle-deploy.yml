# -----------------------------------------------------------------
# Bundle Deploy Pipeline
# Triggered when changes are pushed to main or release branches
# Deploys the LOB bundle to the appropriate target workspace
# -----------------------------------------------------------------

trigger:
  branches:
    include:
      - main
      - release/*
  paths:
    include:
      - src/**
      - resources/**
      - databricks.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - resources/**
      - databricks.yml

variables:
  - group: databricks-lob-variables

stages:
  - stage: Validate
    displayName: Validate Bundle
    jobs:
      - job: ValidateBundle
        displayName: Validate Bundle
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureKeyVault@2
            displayName: Get secrets from Key Vault
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              KeyVaultName: kv-dsgrd-hub
              SecretsFilter: "DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-DEV"
              RunAsPreJob: true

          - script: |
              curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: Install Databricks CLI

          - script: |
              databricks bundle validate
            displayName: Validate bundle
            env:
              DATABRICKS_HOST: {{cookiecutter.workspace_url_dev}}
              DATABRICKS_TOKEN: $(DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-DEV)

  - stage: DeployDev
    displayName: Deploy to Dev
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployDev
        displayName: Deploy to Dev
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureKeyVault@2
            displayName: Get secrets from Key Vault
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              KeyVaultName: kv-dsgrd-hub
              SecretsFilter: "DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-DEV"
              RunAsPreJob: true

          - script: |
              curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: Install Databricks CLI

          - script: |
              databricks bundle deploy --target dev
            displayName: Deploy to dev
            env:
              DATABRICKS_HOST: {{cookiecutter.workspace_url_dev}}
              DATABRICKS_TOKEN: $(DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-DEV)

  - stage: DeployStaging
    displayName: Deploy to Staging
    dependsOn: Validate
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    jobs:
      - job: DeployStaging
        displayName: Deploy to Staging
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureKeyVault@2
            displayName: Get secrets from Key Vault
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              KeyVaultName: kv-dsgrd-hub
              SecretsFilter: "DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-STAGING"
              RunAsPreJob: true

          - script: |
              curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: Install Databricks CLI

          - script: |
              databricks bundle deploy --target staging
            displayName: Deploy to staging
            env:
              DATABRICKS_HOST: {{cookiecutter.workspace_url_staging}}
              DATABRICKS_TOKEN: $(DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-STAGING)

  - stage: DeployProd
    displayName: Deploy to Prod
    dependsOn: DeployStaging
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    jobs:
      - deployment: DeployProd
        displayName: Deploy to Prod
        pool:
          vmImage: ubuntu-latest
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureKeyVault@2
                  displayName: Get secrets from Key Vault
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    KeyVaultName: kv-dsgrd-hub
                    SecretsFilter: "DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-PROD"
                    RunAsPreJob: true

                - script: |
                    curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
                  displayName: Install Databricks CLI

                - script: |
                    databricks bundle deploy --target prod
                  displayName: Deploy to prod
                  env:
                    DATABRICKS_HOST: {{cookiecutter.workspace_url_prod}}
                    DATABRICKS_TOKEN: $(DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-PROD)