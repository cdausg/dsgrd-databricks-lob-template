# -----------------------------------------------------------------
# Bundle Deploy — Azure
# Triggered on push to main or release branches
# Auth: Azure OIDC → Key Vault (kv-dsgrd-hub) → Databricks token
#
# Required GitHub repository variables:
#   AZURE_CLIENT_ID       — App registration client ID for OIDC
#   AZURE_TENANT_ID       — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure subscription ID
# -----------------------------------------------------------------

name: Deploy LOB Bundle

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'src/**'
      - 'resources/**'
      - 'databricks.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'resources/**'
      - 'databricks.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: {% raw %}${{ vars.AZURE_CLIENT_ID }}{% endraw %}
          tenant-id: {% raw %}${{ vars.AZURE_TENANT_ID }}{% endraw %}
          subscription-id: {% raw %}${{ vars.AZURE_SUBSCRIPTION_ID }}{% endraw %}

      - name: Get Databricks token from Key Vault
        uses: azure/CLI@v1
        with:
          inlineScript: |
            token=$(az keyvault secret show --vault-name kv-dsgrd-hub --name "DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-DEV" --query "value" -o tsv)
            echo "::add-mask::$token"
            echo "DATABRICKS_TOKEN=$token" >> $GITHUB_ENV

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.236.0

      - name: Validate bundle
        env:
          DATABRICKS_HOST: {{cookiecutter.workspace_url_dev}}
          DATABRICKS_TOKEN: {% raw %}${{ env.DATABRICKS_TOKEN }}{% endraw %}
        run: databricks bundle validate

  deploy-dev:
    name: Deploy to Dev
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: {% raw %}${{ vars.AZURE_CLIENT_ID }}{% endraw %}
          tenant-id: {% raw %}${{ vars.AZURE_TENANT_ID }}{% endraw %}
          subscription-id: {% raw %}${{ vars.AZURE_SUBSCRIPTION_ID }}{% endraw %}

      - name: Get Databricks token from Key Vault
        uses: azure/CLI@v1
        with:
          inlineScript: |
            token=$(az keyvault secret show --vault-name kv-dsgrd-hub --name "DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-DEV" --query "value" -o tsv)
            echo "::add-mask::$token"
            echo "DATABRICKS_TOKEN=$token" >> $GITHUB_ENV

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.236.0

      - name: Validate bundle
        env:
          DATABRICKS_HOST: {{cookiecutter.workspace_url_dev}}
          DATABRICKS_TOKEN: {% raw %}${{ env.DATABRICKS_TOKEN }}{% endraw %}
        run: databricks bundle validate --target dev

      - name: Deploy to dev
        env:
          DATABRICKS_HOST: {{cookiecutter.workspace_url_dev}}
          DATABRICKS_TOKEN: {% raw %}${{ env.DATABRICKS_TOKEN }}{% endraw %}
        run: databricks bundle deploy --target dev

  deploy-staging:
    name: Deploy to Staging
    needs: validate
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: {% raw %}${{ vars.AZURE_CLIENT_ID }}{% endraw %}
          tenant-id: {% raw %}${{ vars.AZURE_TENANT_ID }}{% endraw %}
          subscription-id: {% raw %}${{ vars.AZURE_SUBSCRIPTION_ID }}{% endraw %}

      - name: Get Databricks token from Key Vault
        uses: azure/CLI@v1
        with:
          inlineScript: |
            token=$(az keyvault secret show --vault-name kv-dsgrd-hub --name "DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-STAGING" --query "value" -o tsv)
            echo "::add-mask::$token"
            echo "DATABRICKS_TOKEN=$token" >> $GITHUB_ENV

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.236.0

      - name: Validate bundle
        env:
          DATABRICKS_HOST: {{cookiecutter.workspace_url_staging}}
          DATABRICKS_TOKEN: {% raw %}${{ env.DATABRICKS_TOKEN }}{% endraw %}
        run: databricks bundle validate --target staging

      - name: Deploy to staging
        env:
          DATABRICKS_HOST: {{cookiecutter.workspace_url_staging}}
          DATABRICKS_TOKEN: {% raw %}${{ env.DATABRICKS_TOKEN }}{% endraw %}
        run: databricks bundle deploy --target staging

  deploy-prod:
    name: Deploy to Prod
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: {% raw %}${{ vars.AZURE_CLIENT_ID }}{% endraw %}
          tenant-id: {% raw %}${{ vars.AZURE_TENANT_ID }}{% endraw %}
          subscription-id: {% raw %}${{ vars.AZURE_SUBSCRIPTION_ID }}{% endraw %}

      - name: Get Databricks token from Key Vault
        uses: azure/CLI@v1
        with:
          inlineScript: |
            token=$(az keyvault secret show --vault-name kv-dsgrd-hub --name "DATABRICKS-TOKEN-{{cookiecutter.lob_name | upper}}-PROD" --query "value" -o tsv)
            echo "::add-mask::$token"
            echo "DATABRICKS_TOKEN=$token" >> $GITHUB_ENV

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.236.0

      - name: Validate bundle
        env:
          DATABRICKS_HOST: {{cookiecutter.workspace_url_prod}}
          DATABRICKS_TOKEN: {% raw %}${{ env.DATABRICKS_TOKEN }}{% endraw %}
        run: databricks bundle validate --target prod

      - name: Deploy to prod
        env:
          DATABRICKS_HOST: {{cookiecutter.workspace_url_prod}}
          DATABRICKS_TOKEN: {% raw %}${{ env.DATABRICKS_TOKEN }}{% endraw %}
        run: databricks bundle deploy --target prod
