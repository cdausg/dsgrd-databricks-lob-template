bundle:
  name: {{cookiecutter.project_slug}}

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog catalog name
    default: {{cookiecutter.catalog_name}}
  schema:
    description: Unity Catalog schema name
    default: {{cookiecutter.schema_name}}
  spark_version:
    description: Databricks runtime version
    default: {{cookiecutter.spark_version}}
  node_type_id:
    description: VM node type (Azure - Standard_DS3_v2, AWS - i3.xlarge)
    default: {{cookiecutter.node_type_id}}
  cluster_policy_id:
    description: Cluster policy ID - get this from the hub platform team
    default: {{cookiecutter.cluster_policy_id}}
  model_name:
    description: MLflow registered model base name (suffixed per model type in job resources)
    default: {{cookiecutter.model_name}}
  mlflow_experiment_path:
    description: MLflow experiment path
    default: {{cookiecutter.mlflow_experiment_path}}

permissions:
  {% if cookiecutter.engineer_principal_type == "group" %}
  - group_name: {{cookiecutter.engineer_group}}
    level: CAN_MANAGE
  {% else %}
  - user_name: {{cookiecutter.engineer_group}}
    level: CAN_MANAGE
  {% endif %}

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: {{cookiecutter.workspace_url_dev}}
    variables:
      catalog: {{cookiecutter.catalog_name}}_dev
      schema: {{cookiecutter.schema_name}}

  staging:
    mode: production
    workspace:
      host: {{cookiecutter.workspace_url_staging}}
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: sp-cicd-{{cookiecutter.lob_name}}-staging
    permissions:
      - service_principal_name: sp-cicd-{{cookiecutter.lob_name}}-staging
        level: CAN_MANAGE
    variables:
      catalog: {{cookiecutter.catalog_name}}_staging
      schema: {{cookiecutter.schema_name}}

  prod:
    mode: production
    workspace:
      host: {{cookiecutter.workspace_url_prod}}
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: sp-cicd-{{cookiecutter.lob_name}}-prod
    permissions:
      - service_principal_name: sp-cicd-{{cookiecutter.lob_name}}-prod
        level: CAN_MANAGE
    variables:
      catalog: {{cookiecutter.catalog_name}}_prod
      schema: {{cookiecutter.schema_name}}