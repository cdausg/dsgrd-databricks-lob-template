resources:
  jobs:
    serving_job:
      name: "[${bundle.target}] {{cookiecutter.lob_display_name}} - {{cookiecutter.project_slug}} Serving Deployment Job"
      job_clusters:
        - job_cluster_key: default
          new_cluster:
            policy_id: ${var.cluster_policy_id}
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            data_security_mode: SINGLE_USER
            {% if cookiecutter.instance_pool_id %}
            instance_pool_id: {{cookiecutter.instance_pool_id}}
            {% endif %}
            autoscale:
              min_workers: 1
              max_workers: 4
      tasks:
        - task_key: deploy_serving_endpoint
          job_cluster_key: default
          spark_python_task:
            python_file: ../src/{{cookiecutter.project_slug}}/serving/deploy_serving.py
            parameters:
              - "--catalog=${var.catalog}"
              - "--schema=${var.schema}"
              - "--model-name=${var.model_name}"

        - task_key: validate_endpoint
          depends_on:
            - task_key: deploy_serving_endpoint
          job_cluster_key: default
          spark_python_task:
            python_file: ../src/{{cookiecutter.project_slug}}/serving/deploy_serving.py
            parameters:
              - "--catalog=${var.catalog}"
              - "--schema=${var.schema}"
              - "--model-name=${var.model_name}"
              - "--validate-only"