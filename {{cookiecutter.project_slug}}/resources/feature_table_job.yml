resources:
  jobs:
    feature_table_job:
      name: "{{cookiecutter.lob_display_name}} - {{cookiecutter.project_slug}} Feature Table Job"
      job_clusters:
        - job_cluster_key: default
          new_cluster:
            policy_id: ${var.cluster_policy_id}
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            {% if cookiecutter.instance_pool_id %}instance_pool_id: {{cookiecutter.instance_pool_id}}
            {% endif %}autoscale:
              min_workers: 1
              max_workers: 4
      schedule:
        quartz_cron_expression: "0 0 1 * * ?"
        timezone_id: "UTC"
      tasks:
        - task_key: compute_features
          job_cluster_key: default
          libraries:
            - pypi:
                package: databricks-feature-engineering
          notebook_task:
            notebook_path: ../src/{{cookiecutter.project_slug}}/features/feature_pipeline.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}