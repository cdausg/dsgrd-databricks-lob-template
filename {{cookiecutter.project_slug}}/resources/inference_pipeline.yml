resources:
  pipelines:
    inference_pipeline:
      name: "{{cookiecutter.lob_display_name}} - {{cookiecutter.project_slug}} Inference Pipeline"
      catalog: ${var.catalog}
      target: ${var.schema}
      channel: CURRENT
      configuration:
        pipeline.catalog: ${var.catalog}
        pipeline.schema: ${var.schema}
        pipeline.model_name: ${var.model_name}_classification
      libraries:
        - notebook:
            path: ../src/{{cookiecutter.project_slug}}/inference/batch_inference.py
      clusters:
        - label: default
          policy_id: ${var.cluster_policy_id}
          node_type_id: ${var.node_type_id}
          {% if cookiecutter.instance_pool_id %}instance_pool_id: {{cookiecutter.instance_pool_id}}
          {% endif %}autoscale:
            min_workers: 1
            max_workers: 4