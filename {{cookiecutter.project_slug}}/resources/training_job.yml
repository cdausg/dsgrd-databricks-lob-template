resources:
  jobs:
    training_job:
      name: "{{cookiecutter.lob_display_name}} - {{cookiecutter.project_slug}} Training Job"
      job_clusters:
        - job_cluster_key: default
          new_cluster:
            policy_id: ${var.cluster_policy_id}
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            autoscale:
              min_workers: 1
              max_workers: 4

      tasks:
        # Classification training - delete if not needed
        - task_key: train_classification
          job_cluster_key: default
          notebook_task:
            notebook_path: ../src/{{cookiecutter.project_slug}}/training/classification/train.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              model_name: ${var.model_name}_classification
              experiment_path: ${var.mlflow_experiment_path}/classification

        # Time series training - delete if not needed
        - task_key: train_time_series
          job_cluster_key: default
          notebook_task:
            notebook_path: ../src/{{cookiecutter.project_slug}}/training/time_series/train.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              model_name: ${var.model_name}_time_series
              experiment_path: ${var.mlflow_experiment_path}/time_series
              horizon: "30"

        # Clustering training - delete if not needed
        - task_key: train_clustering
          job_cluster_key: default
          notebook_task:
            notebook_path: ../src/{{cookiecutter.project_slug}}/training/clustering/train.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              model_name: ${var.model_name}_clustering
              experiment_path: ${var.mlflow_experiment_path}/clustering
              n_clusters: "5"

        # Evaluation - runs after all training tasks
        - task_key: evaluate_classification
          depends_on:
            - task_key: train_classification
          job_cluster_key: default
          notebook_task:
            notebook_path: ../src/{{cookiecutter.project_slug}}/evaluation/classification/evaluate.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              model_name: ${var.model_name}_classification

        - task_key: evaluate_time_series
          depends_on:
            - task_key: train_time_series
          job_cluster_key: default
          notebook_task:
            notebook_path: ../src/{{cookiecutter.project_slug}}/evaluation/time_series/evaluate.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              model_name: ${var.model_name}_time_series
              horizon: "30"

        - task_key: evaluate_clustering
          depends_on:
            - task_key: train_clustering
          job_cluster_key: default
          notebook_task:
            notebook_path: ../src/{{cookiecutter.project_slug}}/evaluation/clustering/evaluate.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              model_name: ${var.model_name}_clustering